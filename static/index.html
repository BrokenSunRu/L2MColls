<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="nav"></div>

  <main>
    <div class="card">
      <h1 id="main-title"></h1>
      <p><small id="main-desc" class="muted"></small></p>
    </div>

    <div class="card">
      <div class="row">
        <a class="pill" id="link-data" href="/data"></a>
        <a class="pill" id="link-inv" href="/inventory"></a>
        <a class="pill" id="link-fnd" href="/finder"></a>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    // Standard Initialization Block running as IIFE immediately after script execution
    (async () => {
      await mountNav();
      document.getElementById("main-title").textContent = t("Local collection tracker");
      document.getElementById("main-desc").textContent = t("In the 'Data' section, you can add missing classes/agathions and collections. In the 'My Items' section, mark everything your character owns from classes and agathions. Then, in the 'Finder' section, you can search for missing collections by desired stats.");
      document.getElementById("link-data").textContent = t("→ Data");
      document.getElementById("link-inv").textContent = t("→ My Items");
      document.getElementById("link-fnd").textContent = t("→ Finder");
    })();
  </script>
</body>
</html>
