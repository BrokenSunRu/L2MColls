<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finder</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="card">
      <h1 id="fnd-h1"></h1>
      <p><small id="fnd-desc" class="muted"></small></p>
      <div class="row">
        <input id="stat" list="statsDatalist" placeholder="STAT_KEY" style="min-width:320px;" />
        <datalist id="statsDatalist"></datalist>
        <button id="go"></button>
        <button id="clearBtn" style="margin-left: 8px; display: none;" onclick="document.getElementById('stat').value=''; run();">✖</button>
      </div>
      <div style="margin-top:16px;">
        <small id="fnd-avail-desc" class="muted"></small>
        <div id="availableStats" style="margin-top: 8px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 8px;"></div>
      </div>
    </div>

    <div class="card" id="mainTabsCard">
      <div class="tabs" style="display:flex; border-bottom:1px solid #374151; margin-bottom:16px;">
        <button id="tabTopUpgrades" class="tab-btn" style="flex:1; padding:10px; background:none; border:none; border-bottom:2px solid #3b82f6; color:var(--text); cursor:pointer; font-weight:bold;"></button>
        <button id="tabEasiest" class="tab-btn" style="flex:1; padding:10px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; font-weight:bold;"></button>
      </div>
      <div id="tabContentTopUpgrades">
        <div id="topUpgradesList"></div>
      </div>
      <div id="tabContentEasiest" style="display:none;">
        <div id="recommendList"></div>
      </div>
    </div>

    <div class="card" id="openedCard" style="display:none;">
      <div style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleCard('opened-wrapper')">
        <h2 id="fnd-opened-h2" style="margin-bottom: 4px; flex:1;"></h2>
        <span id="opened-wrapper-icon" class="muted" style="margin-left:8px;">▼</span>
      </div>
      <div id="opened-wrapper">
        <div id="fnd-opened-sums" style="margin-bottom: 12px;"></div>
        <div id="opened"></div>
      </div>
    </div>

    <div class="card" id="missingCard" style="display:none;">
      <div style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleCard('missing-wrapper')">
        <h2 id="fnd-missing-h2" style="margin-bottom: 4px; flex:1;"></h2>
        <span id="missing-wrapper-icon" class="muted" style="margin-left:8px;">▼</span>
      </div>
      <div id="missing-wrapper">
        <div id="fnd-missing-sums" style="margin-bottom: 12px;"></div>
        <div id="missing"></div>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    // Formats and displays what exactly the user is missing to fulfill a requirement condition
    function renderReqDiff(r) {
      if (r.missing) {
        return `<span class="pill" style="background:#ef4444;">${r.req_type === "class" ? t("Class not owned") : t("Agathion not owned")}</span>`;
      }
      
      let diffs = [];
      if (r.req_type === "class") {
        if (r.have_class_ascend < r.need_class_ascend) 
          diffs.push({ img: `/static/pics/ascend${r.need_class_ascend}.png`, text: `${t("Ascend")}: ${t("need")} ${r.need_class_ascend}, ${t("have")} ${r.have_class_ascend}` });
        if (r.have_class_elevate < r.need_class_elevate) 
          diffs.push({ img: `/static/pics/elevate${r.need_class_elevate}.png`, text: `${t("Elevate")}: ${t("need")} ${r.need_class_elevate}, ${t("have")} ${r.have_class_elevate}` });
      } else {
        if (r.have_ag_meld < r.need_ag_meld) 
          diffs.push({ img: `/static/pics/meld${r.need_ag_meld}.png`, text: `${t("Meld")}: ${t("need")} ${r.need_ag_meld}, ${t("have")} ${r.have_ag_meld}` });
        if (r.have_ag_elevate < r.need_ag_elevate) 
          diffs.push({ img: `/static/pics/elevate${r.need_ag_elevate}.png`, text: `${t("Elevate")}: ${t("need")} ${r.need_ag_elevate}, ${t("have")} ${r.have_ag_elevate}` });
        if (r.have_ag_spiritualize < r.need_ag_spiritualize) 
          diffs.push({ img: `/static/pics/spiritualize${r.need_ag_spiritualize}.png`, text: `${t("Spiritualize")}: ${t("need")} ${r.need_ag_spiritualize}, ${t("have")} ${r.have_ag_spiritualize}` });
      }
      
      if (diffs.length === 0) return `<span class="pill">${t("Condition met")}</span>`;
      return diffs.map(d => `
        <span class="pill" style="display:inline-flex; align-items:center; gap:6px; padding-left:4px;">
          <img src="${d.img}" style="width:24px; height:24px; object-fit:contain;" onerror="this.style.display='none'" />
          <span>${escapeHtml(d.text)}</span>
        </span>
      `).join(" ");
    }

    // Format how value displays based on the type (e.g. flat 5 vs 5%)
    function formatProvides(p) {
      if (typeof p === 'object' && p !== null) {
        return p.type === 'percent' ? `${p.value}%` : `${p.value}`;
      }
      return p;
    }

    function renderSumsHtml(items) {
      const sums = {};
      items.forEach(x => {
        Object.entries(x.provides).forEach(([statName, p]) => {
          if (!sums[statName]) sums[statName] = { flat: 0, percent: 0 };
          if (typeof p === 'object' && p !== null) {
            if (p.type === 'percent') sums[statName].percent += Number(p.value);
            else sums[statName].flat += Number(p.value);
          } else {
            sums[statName].flat += Number(p) || 0;
          }
        });
      });
      
      let parts = [];
      Object.entries(sums).forEach(([stat, vals]) => {
        let sub = [];
        if (vals.flat !== 0) sub.push((vals.flat > 0 ? '+' : '') + parseFloat(vals.flat.toFixed(2)));
        if (vals.percent !== 0) sub.push((vals.percent > 0 ? '+' : '') + parseFloat(vals.percent.toFixed(2)) + '%');
        if (sub.length > 0) {
           parts.push({ stat, text: `${escapeHtml(t(stat))}: ${sub.join(', ')}` });
        }
      });
      
      if (parts.length === 0) return "";
      return `<div style="font-size:0.85em; font-weight:500;">` + 
             parts.map(p => `<span class="pill" style="background:transparent; border:1px solid currentColor; margin-right:4px; margin-bottom:4px; display:inline-block; cursor:pointer;" data-stat="${escapeHtml(p.stat)}" onclick="setStat(this.getAttribute('data-stat'))">${p.text}</span>`).join("") + 
             `</div>`;
    }

    // Draws the HTML items list representing Collections that the user already completed
    function renderOpened(items) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => {
        const bonusesHtml = Object.entries(x.provides).map(([k, v]) => {
          return `<span class="pill" style="background:#10b981; color:#fff; margin-bottom:4px; display:inline-block;">${escapeHtml(t(k))}: +${escapeHtml(formatProvides(v))}</span>`;
        }).join(" ");
        
        return `
        <div class="card">
          <div class="row" style="justify-content:space-between; align-items:flex-start;">
            <div style="flex:1;"><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div style="text-align:right; max-width:60%;">${bonusesHtml}</div>
          </div>
        </div>
        `;
      }).join("");
    }

    // Draws the HTML items list representing Collections that the user has not completed yet
    function renderMissing(items) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => {
        const bonusesHtml = Object.entries(x.provides).map(([k, v]) => {
          return `<span class="pill" style="margin-bottom:4px; display:inline-block;">${escapeHtml(t(k))}: +${escapeHtml(formatProvides(v))}</span>`;
        }).join(" ");
        
        return `
        <div class="card">
          <div class="row" style="justify-content:space-between; align-items:flex-start;">
            <div style="flex:1;"><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div style="text-align:right; max-width:60%;">${bonusesHtml}</div>
          </div>

          <div style="margin-top:10px;">
            <small class="muted">${t("What is not met:")}</small>
            <div style="margin-top:6px;">
              ${x.missing.map(r => {
                const imgName = r.name.toLowerCase().replace(/\s+/g, '_');
                return `
                <div class="card" style="margin:8px 0 0 0; display:flex; gap:12px; align-items:center;">
                  <img src="/static/pics/${escapeHtml(imgName)}.png" style="width:64px; height:auto; border-radius:6px; object-fit:contain;" onerror="this.style.display='none'" />
                  <div style="flex:1;">
                    <div><b><span style="color: ${getRarityColor(r.rarity)};">${escapeHtml(t(r.rarity))}</span> ${escapeHtml(t(r.req_type))}: ${escapeHtml(t(r.name))}</b></div>
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
                      ${renderReqDiff(r)}
                    </div>
                  </div>
                </div>
                `;
              }).join("")}
            </div>
          </div>
        </div>
        `;
      }).join("");
    }

    function renderRecommendations(items) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => {
        const bonusesHtml = Object.entries(x.provides).map(([k, v]) => {
          return `<span class="pill" style="margin-bottom:4px; display:inline-block;">${escapeHtml(t(k))}: +${escapeHtml(formatProvides(v))}</span>`;
        }).join(" ");
        
        return `
        <div class="card">
          <div class="row" style="justify-content:space-between; align-items:flex-start;">
            <div style="flex:1;"><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div style="text-align:right; max-width:60%;">${bonusesHtml}</div>
          </div>
          <div style="margin-top:10px;">
            <small class="muted">${t("What is not met:")}</small>
            <div style="margin-top:6px;">
              ${x.missing.map(r => {
                const imgName = r.name.toLowerCase().replace(/\\s+/g, '_');
                return `
                <div class="card" style="margin:8px 0 0 0; display:flex; gap:12px; align-items:center;">
                  <img src="/static/pics/${escapeHtml(imgName)}.png" style="width:64px; height:auto; border-radius:6px; object-fit:contain;" onerror="this.style.display='none'" />
                  <div style="flex:1;">
                    <div><b><span style="color: ${getRarityColor(r.rarity)};">${escapeHtml(t(r.rarity))}</span> ${escapeHtml(t(r.req_type))}: ${escapeHtml(t(r.name))}</b></div>
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
                      ${renderReqDiff(r)}
                    </div>
                  </div>
                </div>
                `;
              }).join("")}
            </div>
          </div>
        </div>
        `;
      }).join("");
    }

    function renderTopUpgrades(items) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => {
        const bonusesHtml = Object.entries(x.bonuses).map(([k, v]) => {
          return `<span class="pill" style="margin-bottom:4px; display:inline-block;">${escapeHtml(t(k))}: +${escapeHtml(formatProvides(v))}</span>`;
        }).join(" ");
        
        let actionText = x.action;
        if (actionText === "acquire") actionText = t("Acquire");
        else if (actionText === "ascend") actionText = t("Ascend");
        else if (actionText === "elevate" || actionText === "elevate_ag") actionText = t("Elevate");
        else if (actionText === "meld") actionText = t("Meld");
        else if (actionText === "spiritualize") actionText = t("Spiritualize");

        const imgName = x.name.toLowerCase().replace(/\s+/g, '_');
        
        return `
        <div class="card" style="margin-bottom:8px; display:flex; gap:12px; align-items:center;">
          <img src="/static/pics/${escapeHtml(imgName)}.png" style="width:64px; height:auto; border-radius:6px; object-fit:contain;" onerror="this.style.display='none'" />
          <div style="flex:1;">
            <div class="row" style="justify-content:space-between;">
              <div><b><span style="color: ${getRarityColor(x.rarity)};">${escapeHtml(t(x.rarity))}</span> ${escapeHtml(t(x.req_type))}: ${escapeHtml(t(x.name))}</b></div>
              <div class="pill" style="background:#3b82f6; color:#fff;">${t("Unlocks collections:")} ${x.collections_count}</div>
            </div>
            <div style="margin-top:8px;"><span class="pill" style="background:#1f2a37; border:1px solid #4b5563;">${t("Action")}: <b style="color:#10b981;">${escapeHtml(actionText)}</b></span></div>
            <div style="margin-top:8px;">${bonusesHtml}</div>
          </div>
        </div>`;
      }).join("");
    }

    let availableStatsCache = [];

    window.toggleCard = (id) => {
      const content = document.getElementById(id);
      const icon = document.getElementById(id + "-icon");
      if (content.style.display === "none") {
        content.style.display = "block";
        icon.textContent = "▼";
      } else {
        content.style.display = "none";
        icon.textContent = "▶";
      }
    };

    // Fetches search results and splits them into "opened" and "missing" arrays to render
    async function run() {
      const rawInput = document.getElementById("stat").value;
      const statInputs = rawInput.split(',').map(s => s.trim()).filter(Boolean);
      
      if (rawInput.trim().length > 0) {
        document.getElementById("clearBtn").style.display = "inline-block";
      } else {
        document.getElementById("clearBtn").style.display = "none";
      }

      let stats = [];
      for (const sIn of statInputs) {
        let found = sIn;
        for (const s of availableStatsCache) {
          if (t(s).toLowerCase() === sIn.toLowerCase() || s.toLowerCase() === sIn.toLowerCase()) {
            found = s;
            break;
          }
        }
        if (!stats.includes(found)) stats.push(found);
      }
      
      let activePill = null;
      const lastStat = stats.length > 0 ? stats[stats.length - 1] : null;

      // Подсвечиваем активный стат (кнопку), если он выбран
      document.querySelectorAll('.stat-pill').forEach(el => {
        const elStat = el.getAttribute('data-stat');
        if (stats.includes(elStat)) {
          el.style.background = '#3b82f6';
          el.style.color = '#ffffff';
          if (elStat === lastStat) activePill = el;
        } else {
          el.style.background = '';
          el.style.color = '';
        }
      });

      if (activePill) {
        activePill.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      if (stats.length === 0) {
        document.getElementById("openedCard").style.display = "none";
        document.getElementById("missingCard").style.display = "none";
        document.getElementById("mainTabsCard").style.display = "block";
        return;
      }
      
      document.getElementById("mainTabsCard").style.display = "none";
      document.getElementById("openedCard").style.display = "block";
      document.getElementById("missingCard").style.display = "block";

      document.getElementById("opened-wrapper").style.display = "block";
      document.getElementById("opened-wrapper-icon").textContent = "▼";
      document.getElementById("missing-wrapper").style.display = "block";
      document.getElementById("missing-wrapper-icon").textContent = "▼";
      
      const results = await Promise.all(stats.map(async (st) => {
          const res = await apiGet(`/api/finder?stat=${encodeURIComponent(st)}`);
          res.forEach(r => { r._statName = st; });
          return res;
      }));
      const allRes = results.flat();

      const mergedMap = new Map();
      for (const item of allRes) {
         if (!mergedMap.has(item.collection_id)) {
             const cloned = { ...item, provides: { [item._statName]: item.provides } };
             mergedMap.set(item.collection_id, cloned);
         } else {
             const existing = mergedMap.get(item.collection_id);
             existing.provides[item._statName] = item.provides;
         }
      }
      const mergedRes = Array.from(mergedMap.values());
      mergedRes.sort((a, b) => {
         if (a.missing.length !== b.missing.length) return a.missing.length - b.missing.length;
         return a.collection_name.localeCompare(b.collection_name);
      });
      
      const opened = mergedRes.filter(x => x.unlocked);
      const missing = mergedRes.filter(x => !x.unlocked);
      
      document.getElementById("opened").innerHTML = renderOpened(opened);
      document.getElementById("missing").innerHTML = renderMissing(missing);

      const openedSumsHtml = renderSumsHtml(opened);
      const missingSumsHtml = renderSumsHtml(missing);

      document.getElementById("fnd-opened-h2").textContent = t("Collections already unlocked");
      document.getElementById("fnd-opened-sums").innerHTML = openedSumsHtml ? `<div style="color:#10b981;">${openedSumsHtml}</div>` : '';

      const missingTitle = stats.length > 1 
        ? t("Collections that give these stats but are not unlocked") 
        : t("Collections that give this stat but are not unlocked");
      document.getElementById("fnd-missing-h2").textContent = missingTitle;
      document.getElementById("fnd-missing-sums").innerHTML = missingSumsHtml ? `<div style="color:#3b82f6;">${missingSumsHtml}</div>` : '';
    }

    window.setStat = (s) => {
      const input = document.getElementById("stat");
      const translated = t(s);
      
      let currentInputs = input.value.split(',').map(v => v.trim()).filter(Boolean);
      const existingIndex = currentInputs.findIndex(v => v.toLowerCase() === translated.toLowerCase() || v.toLowerCase() === s.toLowerCase());
      
      if (existingIndex !== -1) {
        currentInputs.splice(existingIndex, 1);
      } else {
        currentInputs.push(translated);
      }
      
      input.value = currentInputs.join(", ");
      run();
    };

    // Requests list of all available stat names from server and prints them as clickable tags
    async function loadStats() {
      const stats = await apiGet("/api/stats");
      availableStatsCache = stats || [];
      const container = document.getElementById("availableStats");
      const dl = document.getElementById("statsDatalist");
      if (!stats || stats.length === 0) {
        container.innerHTML = `<small class="muted">${t("No stats yet")}</small>`;
        dl.innerHTML = "";
        return;
      }
      
      // Отсортируем статы с учетом текущего языка перед выводом
      sortTranslated(stats);

      dl.innerHTML = stats.map(s => `<option value="${escapeHtml(t(s))}"></option>`).join("");

      container.innerHTML = stats.map(s => `
        <span class="pill stat-pill" data-stat="${escapeHtml(s)}" style="cursor:pointer; transition:0.2s;" onclick="setStat('${escapeHtml(s)}')">${escapeHtml(t(s))}</span>
      `).join("");
    }

    async function loadRecommendations() {
      const [recRes, topRes] = await Promise.all([
        apiGet("/api/recommend"),
        apiGet("/api/top_upgrades")
      ]);
      document.getElementById("recommendList").innerHTML = renderRecommendations(recRes);
      document.getElementById("topUpgradesList").innerHTML = renderTopUpgrades(topRes);
    }

    (async () => {
      await mountNav();

      document.getElementById("fnd-h1").textContent = t("Stat Finder");
      document.getElementById("fnd-desc").textContent = t("Enter stat key...");
      document.getElementById("go").textContent = t("Search");
      document.getElementById("fnd-avail-desc").textContent = t("Available stats in DB:");
      document.getElementById("fnd-opened-h2").textContent = t("Collections already unlocked");
      document.getElementById("fnd-missing-h2").textContent = t("Collections that give this stat but are not unlocked");
      
      document.getElementById("tabTopUpgrades").textContent = t("Top 10 upgrades");
      document.getElementById("tabEasiest").textContent = t("Easiest collections");

      document.getElementById("tabTopUpgrades").onclick = () => {
        document.getElementById("tabTopUpgrades").style.borderColor = "#3b82f6";
        document.getElementById("tabTopUpgrades").style.color = "var(--text)";
        document.getElementById("tabEasiest").style.borderColor = "transparent";
        document.getElementById("tabEasiest").style.color = "var(--muted)";
        document.getElementById("tabContentTopUpgrades").style.display = "block";
      };

      document.getElementById("tabEasiest").onclick = () => {
        document.getElementById("tabEasiest").style.borderColor = "#3b82f6";
        document.getElementById("tabEasiest").style.color = "var(--text)";
        document.getElementById("tabTopUpgrades").style.borderColor = "transparent";
        document.getElementById("tabTopUpgrades").style.color = "var(--muted)";
        document.getElementById("tabContentEasiest").style.display = "block";
        document.getElementById("tabContentTopUpgrades").style.display = "none";
      };

      await loadStats();
      await loadRecommendations();
      document.getElementById("go").onclick = run;
      // Автоматически возвращать на рекомендации, если пользователь полностью стер стат
      document.getElementById("stat").addEventListener("input", () => {
        if (!document.getElementById("stat").value.trim()) run();
      });
    })();
  </script>
</body>
</html>
