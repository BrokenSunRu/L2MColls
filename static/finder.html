<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finder</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="card">
      <h1 id="fnd-h1"></h1>
      <p><small id="fnd-desc" class="muted"></small></p>
      <div class="row">
        <input id="stat" placeholder="STAT_KEY" style="min-width:320px;" />
        <button id="go"></button>
      </div>
      <div style="margin-top:16px;">
        <small id="fnd-avail-desc" class="muted"></small>
        <div id="availableStats" style="margin-top: 8px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px;"></div>
      </div>
    </div>

    <div class="card" id="recommendationsCard">
      <h2 id="fnd-recommend-h2"></h2>
      <div id="recommendList"></div>
    </div>

    <div class="card" id="openedCard" style="display:none;">
      <h2 id="fnd-opened-h2"></h2>
      <div id="opened"></div>
    </div>

    <div class="card" id="missingCard" style="display:none;">
      <h2 id="fnd-missing-h2"></h2>
      <div id="missing"></div>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    // Formats and displays what exactly the user is missing to fulfill a requirement condition
    function renderReqDiff(r) {
      if (r.missing) {
        return `<span class="pill" style="background:#ef4444;">${r.req_type === "class" ? t("Class not owned") : t("Agathion not owned")}</span>`;
      }
      
      let diffs = [];
      if (r.req_type === "class") {
        if (r.have_class_ascend < r.need_class_ascend) 
          diffs.push({ img: `/static/pics/ascend${r.need_class_ascend}.png`, text: `${t("Ascend")}: ${t("need")} ${r.need_class_ascend}, ${t("have")} ${r.have_class_ascend}` });
        if (r.have_class_elevate < r.need_class_elevate) 
          diffs.push({ img: `/static/pics/elevate${r.need_class_elevate}.png`, text: `${t("Elevate")}: ${t("need")} ${r.need_class_elevate}, ${t("have")} ${r.have_class_elevate}` });
      } else {
        if (r.have_ag_meld < r.need_ag_meld) 
          diffs.push({ img: `/static/pics/meld${r.need_ag_meld}.png`, text: `${t("Meld")}: ${t("need")} ${r.need_ag_meld}, ${t("have")} ${r.have_ag_meld}` });
        if (r.have_ag_elevate < r.need_ag_elevate) 
          diffs.push({ img: `/static/pics/elevate${r.need_ag_elevate}.png`, text: `${t("Elevate")}: ${t("need")} ${r.need_ag_elevate}, ${t("have")} ${r.have_ag_elevate}` });
        if (r.have_ag_spiritualize < r.need_ag_spiritualize) 
          diffs.push({ img: `/static/pics/spiritualize${r.need_ag_spiritualize}.png`, text: `${t("Spiritualize")}: ${t("need")} ${r.need_ag_spiritualize}, ${t("have")} ${r.have_ag_spiritualize}` });
      }
      
      if (diffs.length === 0) return `<span class="pill">${t("Condition met")}</span>`;
      return diffs.map(d => `
        <span class="pill" style="display:inline-flex; align-items:center; gap:6px; padding-left:4px;">
          <img src="${d.img}" style="width:24px; height:24px; object-fit:contain;" onerror="this.style.display='none'" />
          <span>${escapeHtml(d.text)}</span>
        </span>
      `).join(" ");
    }

    // Format how value displays based on the type (e.g. flat 5 vs 5%)
    function formatProvides(p) {
      if (typeof p === 'object' && p !== null) {
        return p.type === 'percent' ? `${p.value}%` : `${p.value}`;
      }
      return p;
    }

    // Sums up all the specific stat values across different collections
    function sumProvides(items) {
      let flat = 0, percent = 0;
      items.forEach(x => {
        let p = x.provides;
        if (typeof p === 'object' && p !== null) {
          if (p.type === 'percent') percent += Number(p.value);
          else flat += Number(p.value);
        } else {
          flat += Number(p) || 0;
        }
      });
      let parts = [];
      if (flat !== 0) parts.push((flat > 0 ? '+' : '') + parseFloat(flat.toFixed(2)));
      if (percent !== 0) parts.push((percent > 0 ? '+' : '') + parseFloat(percent.toFixed(2)) + '%');
      return parts.join(', ');
    }

    // Draws the HTML items list representing Collections that the user already completed
    function renderOpened(items, stat) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => `
        <div class="card">
          <div class="row" style="justify-content:space-between;">
            <div><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div class="pill" style="background:#10b981; color:#fff;">
              ${escapeHtml(t(stat))}: +${escapeHtml(formatProvides(x.provides))}
            </div>
          </div>
        </div>
      `).join("");
    }

    // Draws the HTML items list representing Collections that the user has not completed yet
    function renderMissing(items, stat) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => `
        <div class="card">
          <div class="row" style="justify-content:space-between;">
            <div><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div class="pill">${escapeHtml(t(stat))}: +${escapeHtml(formatProvides(x.provides))}</div>
          </div>

          <div style="margin-top:10px;">
            <small class="muted">${t("What is not met:")}</small>
            <div style="margin-top:6px;">
              ${x.missing.map(r => {
                const imgName = r.name.toLowerCase().replace(/\s+/g, '_');
                return `
                <div class="card" style="margin:8px 0 0 0; display:flex; gap:12px; align-items:center;">
                  <img src="/static/pics/${escapeHtml(imgName)}.png" style="width:64px; height:auto; border-radius:6px; object-fit:contain;" onerror="this.style.display='none'" />
                  <div style="flex:1;">
                    <div><b><span style="color: ${getRarityColor(r.rarity)};">${escapeHtml(t(r.rarity))}</span> ${escapeHtml(t(r.req_type))}: ${escapeHtml(t(r.name))}</b></div>
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
                      ${renderReqDiff(r)}
                    </div>
                  </div>
                </div>
                `;
              }).join("")}
            </div>
          </div>
        </div>
      `).join("");
    }

    function renderRecommendations(items) {
      if (!items || items.length === 0) return `<small class="muted">${t("Nothing found")}</small>`;
      return items.map(x => {
        const bonusesHtml = Object.entries(x.provides).map(([k, v]) => {
          return `<span class="pill" style="margin-bottom:4px; display:inline-block;">${escapeHtml(t(k))}: +${escapeHtml(formatProvides(v))}</span>`;
        }).join(" ");
        
        return `
        <div class="card">
          <div class="row" style="justify-content:space-between; align-items:flex-start;">
            <div style="flex:1;"><b>${escapeHtml(t(x.collection_name))}</b></div>
            <div style="text-align:right; max-width:60%;">${bonusesHtml}</div>
          </div>
          <div style="margin-top:10px;">
            <small class="muted">${t("What is not met:")}</small>
            <div style="margin-top:6px;">
              ${x.missing.map(r => {
                const imgName = r.name.toLowerCase().replace(/\\s+/g, '_');
                return `
                <div class="card" style="margin:8px 0 0 0; display:flex; gap:12px; align-items:center;">
                  <img src="/static/pics/${escapeHtml(imgName)}.png" style="width:64px; height:auto; border-radius:6px; object-fit:contain;" onerror="this.style.display='none'" />
                  <div style="flex:1;">
                    <div><b><span style="color: ${getRarityColor(r.rarity)};">${escapeHtml(t(r.rarity))}</span> ${escapeHtml(t(r.req_type))}: ${escapeHtml(t(r.name))}</b></div>
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
                      ${renderReqDiff(r)}
                    </div>
                  </div>
                </div>
                `;
              }).join("")}
            </div>
          </div>
        </div>
        `;
      }).join("");
    }

    // Fetches search results and splits them into "opened" and "missing" arrays to render
    async function run() {
      const stat = document.getElementById("stat").value.trim();
      
      // Подсвечиваем активный стат (кнопку), если он выбран
      document.querySelectorAll('.stat-pill').forEach(el => {
        if (stat && el.getAttribute('data-stat') === stat) {
          el.style.background = '#3b82f6';
          el.style.color = '#ffffff';
        } else {
          el.style.background = '';
          el.style.color = '';
        }
      });

      if (!stat) {
        document.getElementById("openedCard").style.display = "none";
        document.getElementById("missingCard").style.display = "none";
        document.getElementById("recommendationsCard").style.display = "block";
        return;
      }
      
      document.getElementById("recommendationsCard").style.display = "none";
      document.getElementById("openedCard").style.display = "block";
      document.getElementById("missingCard").style.display = "block";
      
      const res = await apiGet(`/api/finder?stat=${encodeURIComponent(stat)}`);
      const opened = res.filter(x => x.unlocked);
      const missing = res.filter(x => !x.unlocked);
      
      document.getElementById("opened").innerHTML = renderOpened(opened, stat);
      document.getElementById("missing").innerHTML = renderMissing(missing, stat);

      const openedSum = sumProvides(opened);
      const missingSum = sumProvides(missing);

      document.getElementById("fnd-opened-h2").innerHTML = escapeHtml(t("Collections already unlocked")) + 
        (openedSum ? ` <span class="pill" style="font-size:0.65em; vertical-align:middle; background:transparent; border:1px solid #10b981; color:#10b981; margin-left:8px;">${t("Total")}: ${escapeHtml(openedSum)}</span>` : '');

      document.getElementById("fnd-missing-h2").innerHTML = escapeHtml(t("Collections that give this stat but are not unlocked")) + 
        (missingSum ? ` <span class="pill" style="font-size:0.65em; vertical-align:middle; background:transparent; border:1px solid #3b82f6; color:#3b82f6; margin-left:8px;">${t("Total")}: ${escapeHtml(missingSum)}</span>` : '');
    }

    window.setStat = (s) => {
      const input = document.getElementById("stat");
      if (input.value.trim() === s) {
        input.value = ""; // Если стат уже выбран — отжимаем
      } else {
        input.value = s; // Иначе — выбираем
      }
      run();
    };

    // Requests list of all available stat names from server and prints them as clickable tags
    async function loadStats() {
      const stats = await apiGet("/api/stats");
      const container = document.getElementById("availableStats");
      if (!stats || stats.length === 0) {
        container.innerHTML = `<small class="muted">${t("No stats yet")}</small>`;
        return;
      }
      
      // Отсортируем статы с учетом текущего языка перед выводом
      sortTranslated(stats);

      container.innerHTML = stats.map(s => `
        <span class="pill stat-pill" data-stat="${escapeHtml(s)}" style="cursor:pointer; transition:0.2s;" onclick="setStat('${escapeHtml(s)}')">${escapeHtml(t(s))}</span>
      `).join("");
    }

    async function loadRecommendations() {
      const res = await apiGet("/api/recommend");
      document.getElementById("recommendList").innerHTML = renderRecommendations(res);
    }

    (async () => {
      await mountNav();

      document.getElementById("fnd-h1").textContent = t("Stat Finder");
      document.getElementById("fnd-desc").textContent = t("Enter stat key...");
      document.getElementById("go").textContent = t("Search");
      document.getElementById("fnd-avail-desc").textContent = t("Available stats in DB:");
      document.getElementById("fnd-opened-h2").textContent = t("Collections already unlocked");
      document.getElementById("fnd-missing-h2").textContent = t("Collections that give this stat but are not unlocked");
      document.getElementById("fnd-recommend-h2").textContent = t("Easiest collections to complete");

      await loadStats();
      await loadRecommendations();
      document.getElementById("go").onclick = run;
      // Автоматически возвращать на рекомендации, если пользователь полностью стер стат
      document.getElementById("stat").addEventListener("input", () => {
        if (!document.getElementById("stat").value.trim()) run();
      });
    })();
  </script>
</body>
</html>
